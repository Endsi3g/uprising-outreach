name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**"

jobs:
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: ruff check
        working-directory: backend
        run: ruff check app/ tests/

      - name: ruff format check
        working-directory: backend
        run: ruff format --check app/ tests/

      - name: mypy
        working-directory: backend
        run: mypy app/

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: outreach_test
          POSTGRES_USER: outreach
          POSTGRES_PASSWORD: outreach
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://outreach:outreach@localhost/outreach
      DATABASE_URL_TEST: postgresql+asyncpg://outreach:outreach@localhost/outreach_test
      REDIS_URL: redis://localhost:6379
      SECRET_KEY: ci-test-secret-key-not-for-production
      ENCRYPTION_KEY: "dGVzdC1lbmNyeXB0aW9uLWtleS0zMmJ5dGVzISE="
      ANTHROPIC_API_KEY: "dummy-key-for-ci"
      ENVIRONMENT: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Run migrations
        working-directory: backend
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://outreach:outreach@localhost/outreach_test

      - name: Run tests
        working-directory: backend
        run: pytest tests/ -v --tb=short --cov=app --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend
        continue-on-error: true

  migration-check:
    name: Migration check (clean DB)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: outreach_migration_test
          POSTGRES_USER: outreach
          POSTGRES_PASSWORD: outreach
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Upgrade head
        working-directory: backend
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://outreach:outreach@localhost/outreach_migration_test

      - name: Downgrade all
        working-directory: backend
        run: alembic downgrade base
        env:
          DATABASE_URL: postgresql+asyncpg://outreach:outreach@localhost/outreach_migration_test
