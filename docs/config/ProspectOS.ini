 ---
 Phase 1: Foundation

 1.1 — Docker Compose Dev Environment

 Services: postgres:16, redis:7-alpine, backend (uvicorn --reload), worker (arq), frontend (next dev), mailhog (SMTP trap, ports 1025/8025).

 Makefile targets: make dev (docker compose up), make migrate (alembic upgrade head), make test, make worker.

 1.2 — Backend Skeleton

 - app/config.py — pydantic-settings from .env
 - app/database.py — create_async_engine + AsyncSession factory
 - app/main.py — app factory with CORS, middleware stack (in order: RequestID → WorkspaceScope → AuditLog → RateLimit), router mounting
 - app/shared/models.py — Base model with id: UUID, workspace_id: UUID FK, created_at, updated_at, soft-delete deleted_at. All domain models inherit from this — enforces multi-tenancy at the ORM
 level.

 1.3 — Auth Module (app/auth/)

 1. Workspace + User models, migration 0001_workspaces_users.py
 2. JWT auth: python-jose for tokens, passlib[bcrypt] for passwords
 3. Routes: POST /auth/register, POST /auth/login, POST /auth/refresh
 4. get_current_user dependency: decode JWT, load user, attach workspace_id to request.state
 5. require_role(*roles) dependency factory for endpoint-level RBAC

 Role enum: ADMIN | MANAGER | SDR | CLOSER | VIEWER | REVIEWER

 WorkspaceScopeMiddleware (middleware/workspace_scope.py): reads workspace_id from JWT claims, sets SET LOCAL app.workspace_id = '...' at transaction start. Combined with Postgres RLS policies,   
 this prevents cross-tenant data leakage at two independent layers.

 1.4 — Core Entity Migrations (in FK dependency order)

 0001_workspaces_users.py
 0002_rbac_workspace_members.py
 0003_companies_contacts.py
 0004_lead_sources.py
 0005_leads.py            # status enum: RAW|ENRICHING|ENRICHED|SCORED|IN_SEQUENCE|REPLIED|CONVERTED|SUPPRESSED
 0006_tags_taggable.py
 0007_activity_log.py     # (workspace_id, entity_type, entity_id, actor_id, event_type, payload jsonb, occurred_at)
 0008_suppression_entries.py

 Key indexes on every table:
 CREATE INDEX ON leads (workspace_id, created_at DESC);
 CREATE INDEX ON leads (workspace_id, status);
 CREATE INDEX ON leads (workspace_id, score DESC) WHERE score IS NOT NULL;
 CREATE INDEX ON activity_log (workspace_id, entity_id, occurred_at DESC);

 Postgres RLS:
 ALTER TABLE leads ENABLE ROW LEVEL SECURITY;
 CREATE POLICY workspace_isolation ON leads
   USING (workspace_id = current_setting('app.workspace_id')::uuid);
 (Apply to all tenant tables.)

 1.5 — Lead Import (CSV)

 - POST /leads/import (multipart) → preview column headers → client submits mapping → enqueue import_leads_task
 - Worker processes rows in batches of 500, deduplicates on (workspace_id, email), upserts
 - Returns { job_id } — poll GET /jobs/{job_id} for progress
 - Job state in Redis hash (fast reads) + Postgres jobs table (audit)

 1.6 — Leads CRUD API

 GET    /leads                — cursor-based pagination, filterable (LeadFilter pydantic model → .where() clauses)
 POST   /leads                — single create
 GET    /leads/{id}           — detail + enrichment + activity timeline
 PATCH  /leads/{id}           — partial update
 DELETE /leads/{id}           — soft delete
 POST   /leads/bulk-action    — { action: "tag|suppress|add_to_segment|enrich", lead_ids }
 GET    /leads/{id}/activity  — paginated timeline

 All list endpoints return: { data: [], pagination: { next_cursor, has_more, total_count } }. Use keyset pagination only — never offset.

 1.7 — Sender Accounts + DNS Verification

 - POST /senders — create sender record
 - GET /senders/{id}/verify — run SPF/DKIM/DMARC check via dnspython, store result in dns_status jsonb
 - DNS check also re-runs on every campaign launch (constraint: blocked if any check fails)

 1.8 — Frontend Phase 1

