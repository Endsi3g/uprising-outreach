 ProspectOS / Uprising Outreach — Implementation Plan                                                                                                                                               

 Context

 Build a greenfield B2B cold outreach SaaS platform from scratch, based on the PRD at docs/prd-prospecting-app.md and design system at docs/DESIGN.md. The platform replaces fragmented sales tool  
 stacks with a single system: lead sourcing → enrichment → scoring → AI personalization → email sequences → inbox → pipeline → analytics.

 No code exists yet. This plan covers architecture decisions, phased delivery, and the order in which to build things.

