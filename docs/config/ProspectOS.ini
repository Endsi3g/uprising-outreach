 Three-zone shell ((app)/layout.tsx): fixed left sidebar (nav + workspace switcher) + main content area. Composer zone added in Phase 3.

 Phase 1 components:
 - LeadsTable — TanStack Virtual (virtualized), multi-select, column sorting
 - LeadFiltersBar — status chips, score range, search
 - BulkActionBar — appears on row selection
 - LeadDetailDrawer — slide-in panel with activity timeline
 - CSVImportModal — file drop + column mapping step

 State: TanStack Query for all API calls; Zustand for UI state (selected rows, drawer open, active filters).

 ---
 Phase 2: Outreach Activation

 2.1 — Enrichment Workers

 ARQ tasks in workers/enrichment_tasks.py:
 - enrich_email_task(lead_id) — email verification (Hunter.io / ZeroBounce)
 - enrich_linkedin_task(lead_id) — Proxycurl or PhantomBuster
 - enrich_company_task(company_id) — Apollo/Clearbit for size, category
 - Idempotency: check EnrichmentJob for (lead_id, job_type, status=COMPLETED) before running; use ARQ dedup key f"enrich:{job_type}:{lead_id}"
 - EnrichmentSnapshot stores raw JSONB response + normalized fields (allows re-processing without re-fetching)

 2.2 — ICP + Scoring

 - ICP model: mandatory_criteria, bonus_criteria, exclusion_criteria (jsonb)
 - ScoreRule table: { field, operator, value, weight, rule_type }
 - scoring/engine.py: pure function score_lead(lead, icp) → ScoreResult — chain from enrichment via ARQ
 - ScoreResult stores score, matched_rules[], disqualified: bool for full auditability

 2.3 — Template Library + AI Generation

 ProspectOS AI client (ai/client.py):
 # System prompt cached with cache_control: {"type": "ephemeral"}
 # Model: ProspectOS Lead Intel AI
 # Every call stores: prompt_version, context_hash, model, tokens, generated_text

 Prompt registry (ai/prompt_registry.py): versioned keys like "cold_email_v1.2". Never mutate an existing key — bump version. Old GeneratedMessage records retain prompt_version for audit.

 Context builder (ai/context_builder.py): assembles lead + company + ICP + offer into GenerationContext. Enforces per-section token budget.

 POST /ai/generate: accepts { lead_id, template_id, variants: 3 }, returns array of GeneratedMessage.

 2.4 — Campaign Builder + Sequence Engine

 Campaign → Sequence → SequenceStep[]

 Launch validation (must pass all before status = ACTIVE):
 1. Sender DNS: SPF + DKIM + DMARC all valid
 2. All enrolled leads have verification_status = VERIFIED
 3. Sequence has ≥1 step

 Email execution: per-mailbox daily limit tracked in Redis sorted set sender:{id}:{date} — increment on send, block if over limit (default 100/day). Idempotent send: deduplicate on
 (campaign_enrollment_id, sequence_step_id).

 2.5 — Email OAuth

 OAuth callback handler (email/oauth.py): exchange code server-side, encrypt tokens with Fernet (SECRET_KEY env var), store encrypted in sender_accounts. Pre-send: refresh token if expires_at <   
 now + 5min. Send via Gmail API (not SMTP) and Microsoft Graph API.

 ---
 Phase 3: Commercial Exploitation

 3.1 — Unified Inbox

 Polling worker (poll_replies_task): Gmail users().messages().list() + Outlook Graph API, match on lead.email, create Conversation + Reply, enqueue classify_reply_task.

 Reply classification via AI: INTERESTED | NOT_INTERESTED | BOUNCE | OUT_OF_OFFICE | QUESTION | REFERRAL. Store classification + confidence. Emit reply.classified event → auto-create Task for 
  INTERESTED replies.

 3.2 — Task + Pipeline

 - Task: { assignee_id, lead_id, type: CALL|EMAIL|REVIEW, due_at }
 - "Next best action" rule engine (tasks/nba.py): emit recommendations based on reply classification + time since last touch + score
 - Opportunity Kanban: { lead_id, stage, value, expected_close_date }
 - PATCH /pipeline/opportunities/{id} — stage change triggers opportunity.stage_changed event

 3.3 — Analytics

 Read from activity_log + email_events. Implement as Postgres materialized views refreshed hourly via ARQ. Key endpoints:

 GET /analytics/funnel          — leads by status over time
 GET /analytics/campaigns/{id}  — open/reply/bounce rates
 GET /analytics/mailbox-health  — per sender: sends/day, bounce rate
 GET /analytics/conversion      — opportunities created/won by source

 ---
 Phase 4: Prospect Audit Engine (Future)

 - Website crawler: playwright headless + beautifulsoup4 for metadata extraction
 - Signals: form presence, page speed, CTA count, design age (meta date tags), SEO structure
 - AuditSnapshot stored as JSONB + structured fields
 - ProspectOS AI generates "opportunity brief" from signals — feeds directly into AI message generation context
 - This is the platform's primary differentiation for Uprising Studio's local SMB market

 ---
 Architectural Non-Negotiables

 1. Campaign blocked without DNS — validate_campaign_launch() checks SPF/DKIM/DMARC before every launch
 2. No unverified email in sequences — verification_status = VERIFIED required to enter sequence
 3. AI audit trail — every GeneratedMessage stores prompt_version + context_hash + model + tokens
 4. Idempotent workers — check job table before running; ARQ dedup keys prevent double-sends
 5. Per-mailbox send limits — Redis counter per sender:{id}:{date}, default cap 100/day
 6. Multi-tenancy — workspace_id on every table; WorkspaceScopeMiddleware + Postgres RLS as two independent layers

 ---
 API Conventions

 - URL: /api/v1/{resource} — workspace implicit from JWT, never in URL
 - Lists: { data: [], pagination: { next_cursor, has_more, total_count } } (keyset only)
 - Creates: 201 + full resource
 - Async ops: 202 + { job_id }, poll GET /jobs/{job_id}
 - Errors: { "error": { "code": "SCREAMING_SNAKE", "message": "...", "details": {} } }

 ---
 Background Job Priorities

 - outreach:critical — token refresh, email send (time-sensitive)
 - outreach:default — enrichment, scoring, reply polling
 - outreach:bulk — CSV import, analytics refresh

 ---
 Testing Requirements

 Backend: 80% coverage gate enforced in CI
 - Unit: scoring engine, context builder, DNS checker, CSV mapper (no DB)
 - Integration: real test DB (outreach_test, auto-migrated), mocked external APIs via pytest-respx
 - Critical suites: test_campaign_launch_validation.py, test_enrichment_idempotency.py, test_rbac.py

 Frontend: Vitest + Testing Library (components); Playwright E2E (login → import → campaign → launch)

 CI gates (GitHub Actions): ruff + mypy, pytest (postgres+redis services), eslint + tsc, alembic upgrade head on clean DB, Playwright on full Docker stack

