<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ProspectOS Sidepanel</title>
  <style>
    /* 
      Claude-Inspired Design System 
      Following docs/design/DESIGN.md 
    */
    :root {
      /* Primary Palette */
      --color-parchment: #f5f4ed; /* Main Background */
      --color-ivory: #faf9f5;    /* Cards & Elevated Containers */
      --color-terracotta: #c96442; /* Brand CTA */
      --color-near-black: #141413; /* Primary Text */
      --color-olive-gray: #5e5d59; /* Secondary Body Text */
      --color-stone-gray: #87867f; /* Tertiary / Metadata */
      --color-sand: #e8e6dc;       /* Secondary Buttons / Backgrounds */
      --color-cream: #f0eee6;      /* Borders */
      --color-warm-ring: #d1cfc5;  /* Ring Shadows */
      
      /* Semantic */
      --color-focus: #3898ec;
      --color-error: #b53333;
    }
    
    * { box-sizing: border-box; }
    
    body {
      margin: 0;
      padding: 0;
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      background: var(--color-parchment);
      color: var(--color-near-black);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      line-height: 1.60;
      -webkit-font-smoothing: antialiased;
    }
    
    h1, h2, h3, .serif {
      font-family: "Georgia", serif;
      font-weight: 500;
      line-height: 1.25;
      letter-spacing: -0.01em;
      margin: 0;
    }
    
    header {
      padding: 24px 20px;
      background: var(--color-parchment);
      border-bottom: 1px solid var(--color-cream);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    
    .logo {
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--color-near-black);
    }
    
    .logo span { color: var(--color-terracotta); font-size: 1.4rem; }

    #chat-history {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scrollbar-width: thin;
      scrollbar-color: var(--color-sand) transparent;
    }
    
    .message {
      max-width: 90%;
      display: flex;
      flex-direction: column;
      animation: messageIn 0.4s ease-out;
    }
    
    @keyframes messageIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .message.user { align-self: flex-end; }
    .message.assistant { align-self: flex-start; }
    
    .message-inner {
      padding: 16px 20px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.6;
    }
    
    .message.user .message-inner {
      background: var(--color-ivory);
      color: var(--color-near-black);
      box-shadow: 0 0 0 1px var(--color-warm-ring);
    }
    
    .message.assistant .message-inner {
      background: transparent;
      border-left: 2px solid var(--color-warm-ring);
      padding-left: 24px;
      border-radius: 0;
      color: var(--color-near-black);
    }
    
    /* Layout Chapter Rhythm */
    .analyze-banner {
      background: var(--color-ivory);
      padding: 24px;
      border-radius: 16px;
      margin-bottom: 20px;
      border: 1px solid var(--color-cream);
      box-shadow: rgba(0,0,0,0.02) 0px 4px 12px;
      transition: all 0.3s ease;
    }
    
    .analyze-banner:hover {
      box-shadow: rgba(0,0,0,0.05) 0px 8px 32px;
      transform: translateY(-2px);
    }
    
    .analyze-banner h3 {
      font-size: 1.1rem;
      margin-bottom: 10px;
    }
    
    .analyze-banner p {
      margin: 0 0 20px 0;
      font-size: 14px;
      color: var(--color-olive-gray);
    }

    #analyze-button {
      background: var(--color-terracotta);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(201, 100, 66, 0.2);
    }
    
    #analyze-button:hover {
      transform: scale(1.02);
      box-shadow: 0 6px 16px rgba(201, 100, 66, 0.3);
    }
    
    footer {
      padding: 24px 20px;
      background: var(--color-parchment);
      border-top: 1px solid var(--color-cream);
    }
    
    .composer-container {
      background: var(--color-ivory);
      border: 1px solid var(--color-cream);
      border-radius: 20px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      box-shadow: rgba(0,0,0,0.03) 0px 4px 12px;
      transition: box-shadow 0.3s ease;
    }
    
    .composer-container:focus-within {
      box-shadow: 0 0 0 2px var(--color-focus)22, rgba(0,0,0,0.05) 0px 8px 32px;
    }
    
    textarea {
      width: 100%;
      border: none;
      background: transparent;
      outline: none;
      resize: none;
      font-size: 16px;
      padding: 6px;
      min-height: 48px;
      color: var(--color-near-black);
      font-family: inherit;
      line-height: 1.5;
    }
    
    textarea::placeholder { color: var(--color-stone-gray); opacity: 0.7; }

    .composer-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 8px;
      border-top: 1px solid var(--color-cream);
    }
    
    .btn-secondary {
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--color-stone-gray);
      padding: 8px;
      display: flex;
      align-items: center;
      border-radius: 10px;
      transition: all 0.2s ease;
    }
    
    .btn-secondary:hover { color: var(--color-near-black); background: var(--color-cream); }
    
    .btn-primary {
      background: var(--color-terracotta);
      border: none;
      color: white;
      padding: 10px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.2s ease;
      box-shadow: 0 2px 8px rgba(201, 100, 66, 0.2);
    }
    
    .btn-primary:hover { 
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(201, 100, 66, 0.3);
    }
    
    .copyright {
      text-align: center;
      font-size: 10px;
      color: var(--color-stone-gray);
      margin-top: 20px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo serif"><span>✺</span> ProspectOS</div>
    <div id="settings-btn" style="color:var(--color-stone-gray); cursor:pointer; transition:color 0.2s ease;" title="Paramètres">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </div>
  </header>

  <div id="chat-history">
    <!-- Analysis Action Chapter -->
    <div class="analyze-banner">
      <h3 class="serif">Intelligence de Page</h3>
      <p>Extraire des signaux de vente et des angles d'approche personnalisés depuis cet onglet.</p>
      <button id="analyze-button">Analyser la page</button>
    </div>
  </div>

  <footer>
    <div class="composer-container">
      <textarea id="user-input" rows="1" placeholder="Interrogez votre assistant ProspectOS..."></textarea>
      <div class="composer-actions">
        <div style="display:flex; gap:8px;">
          <button class="btn-secondary" title="Joindre un fichier">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
          </button>
        </div>
        <button id="send-button" class="btn-primary">
          <span>Envoyer</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
    <div class="copyright">
      ProspectOS — Claude Haiku Engine
    </div>
  </footer>

  <script src="sidepanel.js"></script>
</body>
</html>
